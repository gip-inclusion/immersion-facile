name: "PR Analytics"

on:
  workflow_dispatch:
    inputs:
      report_date_start:
        description: "Report date start(d/MM/yyyy)"
      report_date_end:
        description: "Report date end(d/MM/yyyy)"

jobs:
  create-report:
    name: "Create PR analytics report"
    runs-on: ubuntu-latest

    steps:
      - name: "Debug GitHub API permissions"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: gip-inclusion
          REPO: immersion-facile
        run: |
          set -euo pipefail

          debug_api() {
            local label="$1"
            local url="$2"

            echo ""
            echo "===== $label ====="
            curl -i -sS \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$url" \
              | sed -n '/^HTTP\|^x-accepted-github-permissions\|^x-oauth-scopes\|^x-ratelimit-remaining\|^x-github-request-id\|^$/Ip'
          }

          debug_api "ORG TEAMS" "https://api.github.com/orgs/$ORG/teams"
          debug_api "REPO" "https://api.github.com/repos/$ORG/$REPO"

      - name: "Run script for analytics"
        uses: AlexSim93/pull-request-analytics-action@2393847d9ed95dbecf321a527f7402aeb3012040
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_FOR_ISSUE: immersion-facile
          GITHUB_OWNER_FOR_ISSUE: gip-inclusion
          GITHUB_OWNERS_REPOS: gip-inclusion/immersion-facile
          CORE_HOURS_START: "9:15"
          CORE_HOURS_END: "18:00"
          TIMEZONE: "Europe/Paris"
          REPORT_DATE_START: ${{ inputs.report_date_start }}
          REPORT_DATE_END: ${{ inputs.report_date_end }}
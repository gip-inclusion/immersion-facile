name: "Renew INSEE password"

on:
  schedule:
    # Le 1er de chaque mois à 8h UTC
    - cron: "0 8 1 * *"
  workflow_dispatch:
    inputs:
      staging_only:
        description: "Ne propager que sur staging (et pentest). Attention : le mot de passe INSEE est quand même renouvelé."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  renew-insee-password:
    runs-on: ubuntu-latest
    # Les secrets SCALINGO_API_TOKEN / SLACK_BOT_TOKEN sont au niveau environment.
    # staging/prod ont des protection rules qui bloquent les branches feature :
    # on utilise review-app hors main (même pattern que les review apps).
    environment: ${{ (github.ref == 'refs/heads/main' || github.event_name == 'schedule') && (inputs.staging_only && 'staging' || 'prod') }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Scalingo CLI
        uses: ./.github/actions/install-scalingo-cli

      - name: Login to Scalingo
        env:
          SCALINGO_API_TOKEN: ${{ secrets.SCALINGO_API_TOKEN }}
        run: |
          if [ -z "${SCALINGO_API_TOKEN}" ]; then
            echo "SCALINGO_API_TOKEN is empty for this GitHub Environment" >&2
            exit 1
          fi
          scalingo login --api-token "${SCALINGO_API_TOKEN}"

      - name: Renew INSEE password and update Scalingo apps
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STAGING_ONLY: ${{ inputs.staging_only || false }}
        run: |
          set -euo pipefail
          set +H

          INSEE_TOKEN_URL="https://auth.insee.net/auth/realms/apim-gravitee/protocol/openid-connect/token"
          INSEE_RENEWAL_URL="https://api.insee.fr/api-sirene/prive/3.11/renouvellement"
          PASSWORD_VAR="SIRENE_INSEE_PASSWORD"
          CLIENT_ID_VAR="SIRENE_INSEE_CLIENT_ID"
          CLIENT_SECRET_VAR="SIRENE_INSEE_CLIENT_SECRET"
          USERNAME_VAR="SIRENE_INSEE_USERNAME"

          # Mot de passe partagé : lecture depuis prod en run complet, depuis staging en staging_only.
          SOURCE_APP="if-prod-back"
          SOURCE_REGION="osc-secnum-fr1"
          TARGETS=(
            "if-staging-back:osc-fr1:#if-staging-déploiement"
            "if-pentest-back:osc-fr1:#if-pentest-notifications"
            "if-prod-back:osc-secnum-fr1:#if-prod-déploiement"
          )
          if [ "${STAGING_ONLY}" = "true" ]; then
            echo "staging_only=true : lecture + propagation limitées à staging et pentest."
            SOURCE_APP="if-staging-back"
            SOURCE_REGION="osc-fr1"
            TARGETS=(
              "if-staging-back:osc-fr1:#if-staging-déploiement"
              "if-pentest-back:osc-fr1:#if-pentest-notifications"
            )
          fi

          notify_slack() {
            local channel="$1"
            local text="$2"
            jq -n \
              --arg channel "${channel}" \
              --arg header "❌ Échec renouvellement mot de passe INSEE" \
              --arg text "${text}" \
              --arg workflow "${WORKFLOW_URL}" \
              '{
                channel: $channel,
                blocks: [
                  { type: "header", text: { type: "plain_text", text: $header } },
                  { type: "section", text: { type: "mrkdwn", text: $text } },
                  {
                    type: "actions",
                    elements: [
                      { type: "button", style: "danger", text: { type: "plain_text", text: "Voir le workflow" }, url: $workflow }
                    ]
                  }
                ]
              }' | curl --location "https://slack.com/api/chat.postMessage" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
                -d @-
          }

          notify_all_slack() {
            local text="$1"
            local app_region_channel
            for app_region_channel in "${TARGETS[@]}"; do
              notify_slack "${app_region_channel##*:}" "${text}"
            done
          }

          pick_char() {
            local chars="$1"
            local idx
            idx=$((16#$(openssl rand -hex 1) % ${#chars}))
            echo "${chars:idx:1}"
          }

          generate_password() {
            local upper='ABCDEFGHJKLMNPQRSTUVWXYZ'
            local lower='abcdefghjkmnpqrstuvwxyz'
            local digits='23456789'
            local special='!@#%&*+-=?'
            local all="${upper}${lower}${digits}${special}"
            local password=""
            password+="$(pick_char "$upper")"
            password+="$(pick_char "$lower")"
            password+="$(pick_char "$digits")"
            password+="$(pick_char "$special")"
            local _
            for _ in {1..16}; do
              password+="$(pick_char "$all")"
            done
            printf '%s' "$password" | fold -w1 | shuf | tr -d '\n'
          }

          scalingo_env_value() {
            local app="$1"
            local region="$2"
            local var_name="$3"
            scalingo --app "${app}" --region "${region}" env \
              | grep "^${var_name}=" \
              | cut -d '=' -f2-
          }

          client_id="$(scalingo_env_value "${SOURCE_APP}" "${SOURCE_REGION}" "${CLIENT_ID_VAR}")"
          client_secret="$(scalingo_env_value "${SOURCE_APP}" "${SOURCE_REGION}" "${CLIENT_SECRET_VAR}")"
          username="$(scalingo_env_value "${SOURCE_APP}" "${SOURCE_REGION}" "${USERNAME_VAR}")"
          old_password="$(scalingo_env_value "${SOURCE_APP}" "${SOURCE_REGION}" "${PASSWORD_VAR}")"

          if [ -z "${client_id}" ] || [ -z "${client_secret}" ] || [ -z "${username}" ] || [ -z "${old_password}" ]; then
            echo "Missing INSEE credentials on ${SOURCE_APP}" >&2
            notify_all_slack "<!subteam^S089GE2GKEH|@if-devs> Credentials INSEE incomplets sur *${SOURCE_APP}*."
            exit 1
          fi

          new_password="$(generate_password)"
          if [ "${new_password}" = "${old_password}" ]; then
            echo "Generated password is identical to current password" >&2
            notify_all_slack "<!subteam^S089GE2GKEH|@if-devs> Mot de passe généré identique à l'actuel."
            exit 1
          fi

          echo "Fetching INSEE access token..."
          if ! token_response=$(
            curl -sf -X POST "${INSEE_TOKEN_URL}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=password" \
              --data-urlencode "client_id=${client_id}" \
              --data-urlencode "client_secret=${client_secret}" \
              --data-urlencode "username=${username}" \
              --data-urlencode "password=${old_password}"
          ); then
            echo "Failed to fetch INSEE access token" >&2
            notify_all_slack "<!subteam^S089GE2GKEH|@if-devs> Échec de l'obtention du token INSEE."
            exit 1
          fi
          access_token=$(echo "${token_response}" | jq -r '.access_token')

          echo "Calling INSEE password renewal API..."
          if ! jq -n \
            --arg oldPassword "${old_password}" \
            --arg newPassword "${new_password}" \
            '{ oldPassword: $oldPassword, newPassword: $newPassword }' \
          | curl -sf -X POST "${INSEE_RENEWAL_URL}" \
            -H "Authorization: Bearer ${access_token}" \
            -H "Content-Type: application/json" \
            --data-binary @-
          then
            echo "Failed to renew INSEE password" >&2
            notify_all_slack "<!subteam^S089GE2GKEH|@if-devs> Échec de l'appel API de renouvellement du mot de passe INSEE."
            exit 1
          fi

          # Le mot de passe INSEE est déjà changé : on continue la boucle même si un env échoue.
          has_failure=0
          for app_region_channel in "${TARGETS[@]}"; do
            app="${app_region_channel%%:*}"
            rest="${app_region_channel#*:}"
            region="${rest%%:*}"
            channel="${rest#*:}"

            echo "::group::Update ${PASSWORD_VAR} on ${app}"

            echo "Updating ${PASSWORD_VAR} on ${app} (${region})..."
            if ! scalingo --app "${app}" --region "${region}" \
              env-set "${PASSWORD_VAR}=${new_password}"
            then
              echo "Failed to update ${app}" >&2
              notify_slack "${channel}" "<!subteam^S089GE2GKEH|@if-devs> Mot de passe INSEE renouvelé mais échec de la mise à jour de \`${PASSWORD_VAR}\` sur *${app}*."
              has_failure=1
              echo "::endgroup::"
              continue
            fi

            echo "Restarting web containers on ${app}..."
            if ! scalingo --app "${app}" --region "${region}" restart web
            then
              echo "Failed to restart ${app}" >&2
              notify_slack "${channel}" "<!subteam^S089GE2GKEH|@if-devs> Mot de passe mis à jour sur *${app}* mais échec du restart des containers web."
              has_failure=1
              echo "::endgroup::"
              continue
            fi

            echo "Updated ${app}."
            echo "::endgroup::"
          done

          if [ "${has_failure}" -ne 0 ]; then
            exit 1
          fi

          if [ "${STAGING_ONLY}" = "true" ]; then
            echo "INSEE password renewed and propagated to staging and pentest (prod skipped)."
          else
            echo "INSEE password renewed and propagated to staging, pentest and prod."
          fi

name: Generate new release (from latest release)

on:
  workflow_call:
    inputs:
      release_tag:
        type: string
        required: true
      prerelease:
        type: boolean
        required: true

jobs:
  tag-version:
    name: Create release ${{ inputs.release_tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        if: ${{ inputs.prerelease }}
        uses: actions/checkout@v4
      - name: Create RC tag if prerelease
        if: ${{ inputs.prerelease }}
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git tag -a "${{ inputs.release_tag }}" -m "Deployment RC tag"
          git push --tags
      - name: Generate release notes from latest release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const latestRelease = await github.request(`GET /repos/${{ github.repository }}/releases/latest`);
            const latestTag = latestRelease.data.tag_name;
            const releaseTag = "${{ inputs.release_tag }}";

            const releaseNotes = await github.request(`POST /repos/${{ github.repository }}/releases/generate-notes`, {
              tag_name: releaseTag,
              previous_tag_name: latestTag
            });

            const isPrerelease = ${{ inputs.prerelease }};

            console.log({
              latestTag,
              releaseTag,
              isPrerelease,
            })

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const categories = {
              bugFix: { title: "🐛 Bug fixes", lines: [] },
              feature: { title: "✨ Features", lines: [] },
              tech: { title: "🛠️ Tech", lines: [] },
              security: { title: "🔒 Sécurité", lines: [] },
            };

            const categorize = (issue) => {
              if (!issue) return "feature";
              const labelNames = (issue.labels?.nodes ?? []).map((l) => l.name.toLowerCase());
              const typeName = issue.issueType?.name;
              if (typeName === "Sécurité") return "security";
              if (typeName === "Bug") return "bugFix";
              if (labelNames.includes("tech")) return "tech";
              return "feature";
            };

            const fetchIssue = async (issueNumber) => {
              const query = `
                query($owner: String!, $repo: String!, $issueNumber: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $issueNumber) {
                      number
                      labels(first: 20) { nodes { name } }
                      issueType { name }
                    }
                  }
                }
              `;
              try {
                const result = await github.graphql(query, { owner, repo, issueNumber });
                return result.repository.issue;
              } catch (err) {
                console.warn(`Could not fetch issue #${issueNumber}: ${err.message}`);
                return null;
              }
            };

            const body = releaseNotes.data.body ?? "";
            const lines = body.split("\n");
            const issueRefRegex = /^\*\s+#(\d+)\b/;

            const whatsChangedIdx = lines.findIndex((l) => l.startsWith("## What's Changed"));
            const sectionEndIdx = whatsChangedIdx >= 0
              ? lines.findIndex((l, i) => i > whatsChangedIdx && (l.startsWith("##") || l.startsWith("**")))
              : -1;
            const sectionLines = whatsChangedIdx >= 0
              ? lines.slice(whatsChangedIdx + 1, sectionEndIdx === -1 ? lines.length : sectionEndIdx)
              : [];
            const trailingLines = sectionEndIdx === -1 ? [] : lines.slice(sectionEndIdx);

            const categorized = await Promise.all(
              sectionLines.map(async (line) => {
                const issueMatch = line.match(issueRefRegex);
                if (!issueMatch) return null;
                const issue = await fetchIssue(parseInt(issueMatch[1], 10));
                return { line, category: categorize(issue) };
              })
            );

            for (const item of categorized) {
              if (item) categories[item.category].lines.push(item.line);
            }

            const newBodyParts = [];
            for (const cat of Object.values(categories)) {
              if (cat.lines.length === 0) continue;
              newBodyParts.push(`## ${cat.title}`);
              newBodyParts.push(...cat.lines);
              newBodyParts.push("");
            }
            newBodyParts.push(...trailingLines);
            const newBody = newBodyParts.join("\n");

            await github.request(`POST /repos/${{ github.repository }}/releases`, {
              tag_name: releaseTag,
              prerelease: isPrerelease,
              name: releaseNotes.data.name,
              body: newBody,
            });
      - name: Delete old prereleases (if pre-release)
        if: ${{ inputs.prerelease }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const lastPreReleaseTag = '${{ inputs.release_tag }}';
            const releases = await github.request(`GET /repos/${{ github.repository }}/releases`);

            const oldPrereleases = releases.data
              .filter(release => release.prerelease && release.tag_name !== lastPreReleaseTag);

            console.info(`Found ${oldPrereleases.length} old prereleases. Deleting them...`);

            for (const release of oldPrereleases) {
              console.info(`Deleting prerelease: ${release.tag_name} and the corresponding tag`);
              await github.request(`DELETE /repos/${{ github.repository }}/releases/${release.id}`);
              await github.request(`DELETE /repos/${{ github.repository }}/git/refs/tags/${release.tag_name}`);
            }
      - name: "Delete corresponding pre-release (if NOT pre-release)"
        if: ${{ !inputs.prerelease }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prerelease = await github.request(`GET /repos/${{ github.repository }}/releases/tags/${{ inputs.release_tag }}-rc`);
            if (prerelease.data && prerelease.data.id) {
              await github.request(`DELETE /repos/${{ github.repository }}/releases/${prerelease.data.id}`);
              await github.request(`DELETE /repos/${{ github.repository }}/git/refs/tags/${prerelease.data.tag_name}`);
            }
